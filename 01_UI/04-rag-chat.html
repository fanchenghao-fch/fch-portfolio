<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数字分身 · 范诚昊</title>
<style>
:root{
  --paper:#FBFBFD; --white:#fff; --ink:#1D1D1F; --graphite:#15191B;
  --muted:#6E6E73; --line:rgba(0,0,0,0.1);
  --teal:#0E8C82; --teal-deep:#0A6E66; --teal-soft:#E8F4F2;
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue","PingFang SC","Microsoft YaHei",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);color:var(--ink);-webkit-font-smoothing:antialiased;letter-spacing:-0.01em;background:var(--paper);}
a{color:inherit;text-decoration:none;}
.shell{display:flex;justify-content:flex-end;min-height:100vh;background:rgba(20,24,26,0.4);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);}
.panel{width:100%;max-width:460px;background:var(--white);min-height:100vh;display:flex;flex-direction:column;box-shadow:-20px 0 60px rgba(0,0,0,0.18);animation:slide .45s cubic-bezier(.16,1,.3,1);}
@keyframes slide{from{transform:translateX(40px);opacity:.4;}to{transform:none;opacity:1;}}
/* header */
.head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:13px;}
.av{width:42px;height:42px;border-radius:13px;background:var(--teal-soft);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.av svg{width:24px;height:24px;}
.head .t{flex:1;}
.head .t .n{font-size:16px;font-weight:600;letter-spacing:-0.02em;}
.head .t .s{font-size:12.5px;color:var(--muted);margin-top:2px;}
.head .x{width:34px;height:34px;border-radius:50%;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;}
.head .x:hover{background:var(--paper);}
.head .x svg{width:15px;height:15px;}
/* thread */
.thread{flex:1;overflow-y:auto;padding:24px 22px;display:flex;flex-direction:column;gap:18px;}
.welcome{font-size:15px;color:var(--muted);line-height:1.6;}
.welcome b{color:var(--ink);font-weight:600;}
.suggest .lbl{font-size:12px;color:#9a9aa0;letter-spacing:0.06em;text-transform:uppercase;margin:6px 0 12px;}
.chips{display:flex;flex-direction:column;gap:10px;}
.chip{text-align:left;font-size:14.5px;color:#333;background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:13px 16px;cursor:pointer;transition:.2s;font-family:inherit;line-height:1.4;}
.chip:hover{border-color:var(--teal);background:#fff;color:var(--teal-deep);}
.msg{display:flex;flex-direction:column;max-width:86%;}
.msg.me{align-self:flex-end;align-items:flex-end;}
.bubble{font-size:15px;line-height:1.6;padding:12px 16px;border-radius:18px;}
.me .bubble{background:var(--teal);color:#fff;border-bottom-right-radius:6px;}
.bot .bubble{background:var(--paper);color:var(--ink);border:1px solid var(--line);border-bottom-left-radius:6px;}
.cite{font-size:12px;color:var(--teal-deep);margin-top:8px;display:inline-flex;align-items:center;gap:5px;}
/* project ref card */
.ref{margin-top:10px;display:flex;gap:12px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:14px;padding:10px;cursor:pointer;transition:.2s;width:100%;}
.ref:hover{border-color:var(--teal);transform:translateY(-1px);}
.ref .thumb{width:54px;height:54px;border-radius:10px;background:#eef3f2;flex-shrink:0;}
.ref .info .rt{font-size:14px;font-weight:600;letter-spacing:-0.01em;line-height:1.25;}
.ref .info .rd{font-size:12.5px;color:var(--muted);margin-top:3px;}
.ref .go{margin-left:auto;color:var(--teal-deep);font-size:18px;padding-right:6px;}
/* composer */
.composer{padding:14px 18px 20px;border-top:1px solid var(--line);}
.box{display:flex;align-items:flex-end;gap:10px;border:1px solid var(--line);border-radius:18px;padding:8px 8px 8px 16px;background:#fff;transition:.2s;}
.box:focus-within{border-color:var(--teal);box-shadow:0 0 0 3px rgba(14,140,130,0.12);}
.box textarea{flex:1;border:none;outline:none;resize:none;font-family:inherit;font-size:15px;line-height:1.5;max-height:120px;color:var(--ink);background:transparent;padding:7px 0;}
.send{width:38px;height:38px;border-radius:50%;border:none;background:var(--teal);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.2s;}
.send:hover{background:var(--teal-deep);}
.send svg{width:18px;height:18px;}
.disc{font-size:11.5px;color:#a9a9af;text-align:center;margin-top:11px;line-height:1.5;}
</style>
</head>
<body>

<div class="shell">
  <div class="panel">

    <div class="head">
      <div class="av"><svg viewBox="0 0 24 24" fill="none"><circle cx="6" cy="6" r="2.4" fill="#0E8C82"/><circle cx="18" cy="9" r="2.4" fill="#0E8C82"/><circle cx="10" cy="18" r="2.4" fill="#0E8C82"/><line x1="6" y1="6" x2="18" y2="9" stroke="#0E8C82" stroke-width="1.4"/><line x1="18" y1="9" x2="10" y2="18" stroke="#0E8C82" stroke-width="1.4"/></svg></div>
      <div class="t"><div class="n">范诚昊 · 数字分身</div><div class="s">基于真实经历作答 · 带引用</div></div>
      <a href="02-home.html" class="x" aria-label="关闭"><svg viewBox="0 0 24 24" fill="none" stroke="#1D1D1F" stroke-width="2"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></a>
    </div>

    <div class="thread" id="thread">
      <div class="welcome" id="welcome">你好，我是范诚昊的数字分身。关于他的 <b>AI 项目、城市规划经历、技能与作品</b>，都可以直接问我。</div>

      <div class="suggest" id="suggest">
        <div class="lbl">你可以这样问</div>
        <div class="chips">
          <button class="chip" onclick="ask('他做过哪些 AI 项目？')">他做过哪些 AI 项目？</button>
          <button class="chip" onclick="ask('他的城市规划背景，怎么帮到做产品？')">他的城市规划背景，怎么帮到做产品？</button>
          <button class="chip" onclick="ask('他自用的 AI 工具库有哪些？')">他自用的 AI 工具库有哪些？</button>
          <button class="chip" onclick="ask('他在此芯科技具体做了什么？')">他在此芯科技具体做了什么？</button>
        </div>
      </div>
    </div>

    <div class="composer">
      <div class="box">
        <textarea id="input" rows="1" placeholder="问问关于范诚昊的任何事…" oninput="grow(this)"></textarea>
        <button class="send" onclick="send()" aria-label="发送"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="6 11 12 5 18 11"/></svg></button>
      </div>
      <div class="disc">仅基于真实语料作答，不编造 · 与职业无关的问题会礼貌婉拒</div>
    </div>

  </div>
</div>

<script>
const thread=document.getElementById('thread');
const demo={
  '他做过哪些 AI 项目？':{
    text:'目前有 3 个代表性的 AI 项目：① 生活圈幸福度智能监测与推演模型（POI+街景+机器学习）；② AI 热点监控与定时推送工具；③ 把可研编制与项目谋划做成的 Work Flow 与 Agent。其中第①个最能体现"AI×城市"的结合。',
    cite:'引用：项目经历 · 生活圈幸福度模型',
    ref:{t:'生活圈幸福度智能监测与推演模型',d:'AI · 城市 · 机器学习'}
  },
  '他的城市规划背景，怎么帮到做产品？':{
    text:'城乡规划训练给了他两样东西：一是从宏观到微观的系统思维，做需求拆解时更容易看清"问题的结构"；二是空间数据能力（ArcGIS、POI、街景），让他在城市相关的 AI 产品里能直接动手建模，而不只是提需求。',
    cite:'引用：能力画像 · 教育经历',
    ref:null
  },
  '他自用的 AI 工具库有哪些？':{
    text:'他的 AI 应用技能集中在 vibe coding、Work Flow 搭建与 Agent 搭建；常用工具有 Cursor、Figma/Pixso 等。他还把可研编制和项目谋划沉淀成了可复用的工作流。',
    cite:'引用：相关技能 · 项目经历',
    ref:{t:'可研 Work Flow & 项目谋划 Agent',d:'AI 工作流 · Agent'}
  },
  '他在此芯科技具体做了什么？':{
    text:'在此芯科技做 AI 产品经理（AI BOX / AI NAS）：市场研究（竞品参数、产品路线、对标分析）、需求规划（需求拆解、PRD、版本迭代）、以及结合 P1 芯片能力做功能方案与价值卖点的表达。',
    cite:'引用：实习经历 · 此芯科技',
    ref:null
  }
};
function hideSuggest(){const w=document.getElementById('welcome'),s=document.getElementById('suggest');if(w)w.remove();if(s)s.remove();}
function addMe(t){const d=document.createElement('div');d.className='msg me';d.innerHTML='<div class="bubble"></div>';d.querySelector('.bubble').textContent=t;thread.appendChild(d);thread.scrollTop=thread.scrollHeight;}
function addBot(o){
  const d=document.createElement('div');d.className='msg bot';
  let html='<div class="bubble">'+o.text+'</div>';
  if(o.cite)html+='<span class="cite">▸ '+o.cite+'</span>';
  if(o.ref)html+='<a href="03-project-detail.html" class="ref"><div class="thumb"></div><div class="info"><div class="rt">'+o.ref.t+'</div><div class="rd">'+o.ref.d+'</div></div><span class="go">›</span></a>';
  d.innerHTML=html;thread.appendChild(d);thread.scrollTop=thread.scrollHeight;
}
function ask(q){hideSuggest();addMe(q);setTimeout(()=>addBot(demo[q]||{text:'（原型演示）这里会由 RAG 基于真实语料生成带引用的回答。',cite:null,ref:null}),420);}
function send(){const i=document.getElementById('input');const v=i.value.trim();if(!v)return;i.value='';grow(i);ask(v);}
function grow(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}
document.getElementById('input').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});
</script>
</body>
</html>
