<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>进入前 · 范诚昊</title>
<style>
:root{
  --paper:#FBFBFD; --white:#fff; --ink:#1D1D1F; --graphite:#15191B;
  --muted:#6E6E73; --line:rgba(0,0,0,0.12);
  --teal:#0E8C82; --teal-deep:#0A6E66; --teal-soft:#E8F4F2;
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue","PingFang SC","Microsoft YaHei",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;letter-spacing:-0.01em;min-height:100vh;display:flex;flex-direction:column;}
a{color:inherit;text-decoration:none;}
.top{height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;max-width:1080px;width:100%;margin:0 auto;}
.brand{font-weight:600;font-size:17px;letter-spacing:-0.02em;}
.lang{font-size:13px;border:1px solid var(--line);border-radius:980px;padding:5px 13px;color:var(--muted);}
.wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden;}
.bg{position:absolute;inset:0;z-index:0;pointer-events:none;}
.card{position:relative;z-index:1;width:100%;max-width:430px;background:var(--white);border:1px solid var(--line);border-radius:24px;padding:44px 40px 38px;box-shadow:0 24px 70px rgba(0,0,0,0.07);}
.logo{width:46px;height:46px;border-radius:13px;background:var(--teal-soft);display:flex;align-items:center;justify-content:center;margin-bottom:26px;}
.logo svg{width:26px;height:26px;}
h1{font-size:27px;font-weight:600;letter-spacing:-0.03em;line-height:1.18;}
.sub{font-size:15px;color:var(--muted);margin-top:12px;line-height:1.55;}
.field{margin-top:24px;}
.field label{display:block;font-size:13px;font-weight:500;color:#333;margin-bottom:8px;}
.field label .req{color:var(--teal);}
.field input{width:100%;height:50px;border:1px solid var(--line);border-radius:13px;padding:0 16px;font-size:16px;font-family:inherit;color:var(--ink);background:#fff;transition:.2s;letter-spacing:-0.01em;}
.field input::placeholder{color:#b7b7bd;}
.field input:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(14,140,130,0.14);}
.enter{width:100%;height:52px;margin-top:30px;border:none;border-radius:980px;background:var(--teal);color:#fff;font-size:16px;font-weight:500;font-family:inherit;cursor:pointer;transition:.25s;letter-spacing:-0.01em;}
.enter:hover:not(:disabled){background:var(--teal-deep);}
.enter:disabled{background:#c9d6d4;cursor:not-allowed;}
.note{font-size:12.5px;color:#9a9aa0;margin-top:18px;line-height:1.55;text-align:center;}
.note strong{color:var(--muted);font-weight:500;}
@media(max-width:480px){.card{padding:36px 26px 30px;border-radius:20px;}h1{font-size:24px;}}
</style>
</head>
<body>

<div class="top">
  <span class="brand">范诚昊</span>
  <a href="#" class="lang">中 / EN</a>
</div>

<div class="wrap">
  <svg class="bg" viewBox="0 0 1000 700" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
    <g stroke="rgba(14,140,130,0.07)" stroke-width="1">
      <line x1="200" y1="0" x2="200" y2="700"/><line x1="400" y1="0" x2="400" y2="700"/>
      <line x1="600" y1="0" x2="600" y2="700"/><line x1="800" y1="0" x2="800" y2="700"/>
      <line x1="0" y1="160" x2="1000" y2="160"/><line x1="0" y1="340" x2="1000" y2="340"/>
      <line x1="0" y1="520" x2="1000" y2="520"/>
    </g>
    <g fill="rgba(14,140,130,0.18)"><circle cx="200" cy="160" r="4"/><circle cx="600" cy="340" r="5"/><circle cx="800" cy="520" r="4"/></g>
  </svg>

  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none"><circle cx="6" cy="6" r="2.4" fill="#0E8C82"/><circle cx="18" cy="9" r="2.4" fill="#0E8C82"/><circle cx="10" cy="18" r="2.4" fill="#0E8C82"/><line x1="6" y1="6" x2="18" y2="9" stroke="#0E8C82" stroke-width="1.4"/><line x1="18" y1="9" x2="10" y2="18" stroke="#0E8C82" stroke-width="1.4"/></svg>
    </div>
    <h1>在进入前，<br>先认识一下彼此。</h1>
    <p class="sub">留下你所在的团队，方便我了解是谁在关注我，也能为之后的交流做更好的准备。</p>

    <div class="field">
      <label>公司 / 团队名称 <span class="req">*</span></label>
      <input id="company" type="text" placeholder="例如：某某科技 / 某规划设计院" oninput="check()">
    </div>
    <div class="field">
      <label>您的职位 <span class="req">*</span></label>
      <input id="role" type="text" placeholder="例如：技术招聘 / 产品负责人" oninput="check()">
    </div>

    <button class="enter" id="enter" disabled onclick="location.href='02-home.html'">进入主页</button>
    <p class="note"><strong>仅我本人可见</strong> · 不会用于任何其他用途，也不做身份核验。</p>
  </div>
</div>

<script>
function check(){
  const c=document.getElementById('company').value.trim();
  const r=document.getElementById('role').value.trim();
  document.getElementById('enter').disabled=!(c&&r);
}
</script>
</body>
</html>
